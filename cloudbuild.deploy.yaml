steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        IMAGE_REPO="us-central1-docker.pkg.dev/sheep-db1/cloud-run-source-deploy/memlumina-voice-memo"
        APP_VERSION="${_APP_VERSION}"
        BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        IMAGE_TAG="v$${APP_VERSION}-${SHORT_SHA}"
        IMAGE="$${IMAGE_REPO}:$${IMAGE_TAG}"

        docker build \
          -t "$${IMAGE}" \
          -t "$${IMAGE_REPO}:latest" \
          --build-arg VITE_FIREBASE_API_KEY="${_VITE_FIREBASE_API_KEY}" \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN="${_VITE_FIREBASE_AUTH_DOMAIN}" \
          --build-arg VITE_FIREBASE_PROJECT_ID="${_VITE_FIREBASE_PROJECT_ID}" \
          --build-arg VITE_FIREBASE_STORAGE_BUCKET="${_VITE_FIREBASE_STORAGE_BUCKET}" \
          --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${_VITE_FIREBASE_MESSAGING_SENDER_ID}" \
          --build-arg VITE_FIREBASE_APP_ID="${_VITE_FIREBASE_APP_ID}" \
          --build-arg VITE_APP_VERSION="$${APP_VERSION}" \
          --build-arg VITE_BUILD_SHA="${COMMIT_SHA}" \
          --build-arg VITE_BUILD_TIMESTAMP="$${BUILD_TIMESTAMP}" \
          --build-arg VITE_BUILD_ID="${BUILD_ID}" \
          --build-arg VITE_IMAGE_TAG="$${IMAGE_TAG}" \
          .
images:
  - us-central1-docker.pkg.dev/sheep-db1/cloud-run-source-deploy/memlumina-voice-memo:v${_APP_VERSION}-${SHORT_SHA}
  - us-central1-docker.pkg.dev/sheep-db1/cloud-run-source-deploy/memlumina-voice-memo:latest
substitutions:
  _APP_VERSION: 0.1.0
